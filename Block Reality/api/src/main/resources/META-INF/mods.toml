modLoader   = "javafml"
# [47.2,) matches the dependency versionRange below.
# Using [47,) would let Forge 47.0.x/47.1.x start loading the @Mod class
# before the dependency check fires, hitting NoSuchMethodError.
loaderVersion = "[47.2,)"
license     = "MIT"

[[mods]]
modId           = "blockreality"
version         = "0.2a"
displayName     = "Block Reality API"
description     = '''Minecraft 結構物理模擬底層 API — 提供 UnionFind 結構引擎、應力分析、SidecarBridge IPC、藍圖系統與 SPI 擴充介面。'''

[[dependencies.blockreality]]
    modId      = "forge"
    mandatory  = true
    versionRange = "[47.2.0,)"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.blockreality]]
    modId      = "minecraft"
    mandatory  = true
    versionRange = "[1.20.1,1.21)"
    ordering   = "NONE"
    side       = "BOTH"
