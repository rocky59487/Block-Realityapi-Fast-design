# Issue#9: CI/CD 管線 — 自動建置與測試
name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x "Block Reality/gradlew"

      # ForgeGradle 需要解析 Minecraft + Forge 依賴，首次執行較慢。
      # --no-daemon 避免 daemon 殘留；--stacktrace 方便除錯。
      # -PdisableLocking 繞過依賴鎖定（CI 環境無 lockfile）。
      - name: Build & Test
        working-directory: Block Reality
        run: ./gradlew build --no-daemon --stacktrace -PdisableLocking

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            Block Reality/api/build/reports/tests/
            Block Reality/fastdesign/build/reports/tests/

  # TypeScript sidecar 建置與測試
  # continue-on-error: opencascade.js beta 版本在 CI 環境可能解析失敗
  sidecar:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: MctoNurbs-review
        run: npm install

      - name: Build TypeScript
        working-directory: MctoNurbs-review
        run: npm run build

      - name: Run tests
        working-directory: MctoNurbs-review
        run: npm test
