# Issue#9: CI/CD 管線 — 自動建置與測試
name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    # ★ 審計修復：移除 continue-on-error: true，不再掩蓋建置失敗。
    # ForgeGradle 網路問題改用重試邏輯處理。
    strategy:
      matrix:
        java: [ 17 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x "Block Reality/gradlew"

      # ForgeGradle 需要解析 Minecraft + Forge 依賴，首次執行較慢。
      # --no-daemon 避免 daemon 殘留；--stacktrace 方便除錯。
      # -PdisableLocking 繞過依賴鎖定（CI 環境無 lockfile）。
      # ★ 審計修復：增加重試邏輯（3 次嘗試 + 指數退避），
      #   處理 ForgeGradle Maven repo 暫時性網路失敗，而非 continue-on-error 掩蓋。
      - name: Build & Test
        working-directory: Block Reality
        run: |
          for attempt in 1 2 3; do
            echo "=== Build attempt $attempt/3 ==="
            if ./gradlew build --no-daemon --stacktrace -PdisableLocking; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              delay=$((attempt * 15))
              echo "Build failed, retrying in ${delay}s..."
              sleep $delay
            fi
          done
          echo "Build failed after 3 attempts"
          exit 1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            Block Reality/api/build/reports/tests/
            Block Reality/fastdesign/build/reports/tests/

  # v0.3e M1: 原生路徑 CI 執行 — 安裝 Vulkan SDK + glslang，啟用
  # -Pblockreality.native.build=true，並以 -Dpfsf.native.required=true
  # 跑 GoldenParityTest；若 libblockreality_pfsf 無法載入則 fail (而非 skip)。
  # 原 Java-only `build` job 保留為降級相容矩陣 — 兩者都必須綠燈。
  build-native:
    name: build-native (ubuntu, compute.v1-v7)
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        java: [ 17 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-native-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'L1-native/**/CMakeLists.txt') }}
          restore-keys: gradle-native-${{ runner.os }}-

      # Vulkan headers + loader + libs; glslangValidator for precompileShaders.
      # cmake 3.22 ships with ubuntu-22.04 — sufficient for our CMakeLists.
      - name: Install native toolchain (Vulkan SDK, glslang, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libvulkan-dev \
              libvulkan1 \
              vulkan-validationlayers-dev \
              mesa-vulkan-drivers \
              glslang-tools \
              spirv-tools \
              cmake \
              ninja-build \
              build-essential \
              pkg-config
          cmake --version
          glslangValidator --version || true
          # Ubuntu 22.04 ships mesa 23.x which installs lavapipe as
          # /usr/share/vulkan/icd.d/lvp_icd.x86_64.json. api/build.gradle and
          # VulkanSmokeTest hardcode /usr/share/vulkan/icd.d/lvp_icd.json —
          # symlink the arch-suffixed variant to the canonical name so both
          # the VK loader and the test gate resolve.
          ls -la /usr/share/vulkan/icd.d/ || true
          if [ ! -e /usr/share/vulkan/icd.d/lvp_icd.json ]; then
            for candidate in /usr/share/vulkan/icd.d/lvp_icd.*.json; do
              if [ -e "$candidate" ]; then
                sudo ln -sf "$(basename "$candidate")" /usr/share/vulkan/icd.d/lvp_icd.json
                echo "Symlinked $(basename "$candidate") -> lvp_icd.json"
                break
              fi
            done
          fi
          ls -la /usr/share/vulkan/icd.d/ || true
          # Sanity: the loader must find at least one ICD for lavapipe-backed
          # tests. Print but don't fail if vulkaninfo is missing.
          dpkg -L libvulkan1 2>/dev/null | grep -E 'libvulkan\.so' || true

      - name: Grant execute permission for gradlew
        run: chmod +x "Block Reality/gradlew"

      # Stage natives ahead of tests so that a failure in the test step has
      # actionable diagnostics (ldd + nm) in the job log rather than a bare
      # "Process completed with exit code 1".
      - name: Build native libraries
        working-directory: Block Reality
        run: |
          for attempt in 1 2 3; do
            echo "=== nativeBuild attempt $attempt/3 ==="
            if ./gradlew nativeBuild precompileShaders --no-daemon --stacktrace -PdisableLocking \
                -Pblockreality.native.build=true \
                -Pblockreality.native.shaders=true; then
              echo "nativeBuild succeeded on attempt $attempt"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "nativeBuild failed after 3 attempts"
              exit 1
            fi
            delay=$((attempt * 15))
            echo "nativeBuild failed, retrying in ${delay}s..."
            sleep $delay
          done

      - name: Diagnose staged natives
        working-directory: Block Reality
        run: |
          STAGE=api/build/native-out/META-INF/native/linux-x64
          echo "=== stage dir ==="
          ls -la "$STAGE" || true
          echo "=== ldd libblockreality_pfsf.so ==="
          ldd "$STAGE/libblockreality_pfsf.so" || true
          echo "=== ldd libpfsf.so ==="
          ldd "$STAGE/libpfsf.so" || true
          echo "=== ldd libbr_core.so ==="
          ldd "$STAGE/libbr_core.so" || true
          echo "=== exported pfsf_has_feature symbols ==="
          nm -D --defined-only "$STAGE/libblockreality_pfsf.so" \
              | grep -E 'pfsf_(has_feature|abi_version|install_crash|dump_now)' || true

      # Same retry window as the Java-only build — ForgeGradle Maven resolves
      # are the typical flake.
      - name: Build Java + run parity tests
        working-directory: Block Reality
        run: |
          for attempt in 1 2 3; do
            echo "=== build+test attempt $attempt/3 ==="
            if ./gradlew build --no-daemon --stacktrace -PdisableLocking \
                -Pblockreality.native.build=true \
                -Pblockreality.native.shaders=true \
                -Dpfsf.native.required=true; then
              echo "build+test succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              delay=$((attempt * 15))
              echo "build+test failed, retrying in ${delay}s..."
              sleep $delay
            fi
          done
          echo "build+test failed after 3 attempts"
          exit 1

      # Name matches what .github/workflows/check-abi.yml's `binary` job
      # expects — keeps the binary ABI gate wired end-to-end.
      - name: Upload libblockreality_pfsf (linux-x64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libblockreality_pfsf-linux-x64
          path: |
            Block Reality/api/build/native-out/META-INF/native/linux-x64/libblockreality_pfsf.so
          if-no-files-found: error

      - name: Upload native test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-native
          path: |
            Block Reality/api/build/reports/tests/
            Block Reality/fastdesign/build/reports/tests/
