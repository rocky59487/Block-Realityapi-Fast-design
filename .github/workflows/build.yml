# Issue#9: CI/CD 管線 — 自動建置與測試
name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    # ★ 審計修復：移除 continue-on-error: true，不再掩蓋建置失敗。
    # ForgeGradle 網路問題改用重試邏輯處理。
    strategy:
      matrix:
        java: [ 17 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x "Block Reality/gradlew"

      # ForgeGradle 需要解析 Minecraft + Forge 依賴，首次執行較慢。
      # --no-daemon 避免 daemon 殘留；--stacktrace 方便除錯。
      # -PdisableLocking 繞過依賴鎖定（CI 環境無 lockfile）。
      # ★ 審計修復：增加重試邏輯（3 次嘗試 + 指數退避），
      #   處理 ForgeGradle Maven repo 暫時性網路失敗，而非 continue-on-error 掩蓋。
      - name: Build & Test
        working-directory: Block Reality
        run: |
          for attempt in 1 2 3; do
            echo "=== Build attempt $attempt/3 ==="
            if ./gradlew build --no-daemon --stacktrace -PdisableLocking; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              delay=$((attempt * 15))
              echo "Build failed, retrying in ${delay}s..."
              sleep $delay
            fi
          done
          echo "Build failed after 3 attempts"
          exit 1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            Block Reality/api/build/reports/tests/
            Block Reality/fastdesign/build/reports/tests/

  # TypeScript sidecar 建置與測試
  # ★ 審計修復：移除 continue-on-error: true，
  #   opencascade.js 版本問題應固定版本而非掩蓋失敗。
  sidecar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: MctoNurbs-review
        run: npm install

      - name: Build TypeScript
        working-directory: MctoNurbs-review
        run: npm run build

      - name: Run tests
        working-directory: MctoNurbs-review
        run: npm test
