name: "00 · 初始化工作流程標籤"

# ─────────────────────────────────────────────────────────────────────
# 執行時機：手動觸發，或 workflow 首次執行時
# 職責：確保工作流程所需的 GitHub Labels 都存在
# 使用方法：前往 Actions → "00 · 初始化工作流程標籤" → Run workflow
# ─────────────────────────────────────────────────────────────────────

on:
  # 每次 push 到 main 自動跑（確保標籤隨 workflow 一起部署）
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'   # 只在 workflow 有變動時觸發

  # 手動觸發（緊急補建或強制重建）
  workflow_dispatch:
    inputs:
      force_recreate:
        description: "強制重建所有標籤（會先刪除再建立）"
        type: boolean
        default: false

permissions:
  issues: write

jobs:
  setup-labels:
    name: 建立工作流程標籤
    runs-on: ubuntu-latest

    steps:
      - name: 建立狀態標籤
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FORCE: ${{ inputs.force_recreate }}
        run: |
          set -e

          # 狀態機標籤定義：name|color|description
          declare -A LABELS=(
            ["needs-plan"]="0075ca|使用者提交任務，等待 Claude 制定計畫"
            ["plan-ready"]="cfd3d7|Claude 計畫已完成，等待派遣 Jules"
            ["jules-working"]="e4e669|Jules 正在實作"
            ["claude-reviewing"]="d876e3|Claude 正在審核 PR"
            ["claude-approved"]="0e8a16|Claude 已審核通過，可以合併"
            ["needs-revision"]="e11d48|Jules 需要根據 Claude 審核意見修改"
          )

          for name in "${!LABELS[@]}"; do
            IFS='|' read -r color description <<< "${LABELS[$name]}"

            if [ "$FORCE" = "true" ]; then
              echo "🗑️  刪除舊標籤: $name"
              gh label delete "$name" --repo "$REPO" --yes 2>/dev/null || true
            fi

            echo "🏷️  建立標籤: $name (#$color)"
            gh label create "$name" \
              --color "$color" \
              --description "$description" \
              --repo "$REPO" \
              --force 2>/dev/null || \
            echo "   ⚠️  標籤 '$name' 已存在（跳過）"
          done

          echo ""
          echo "✅ 所有工作流程標籤建立完成："
          gh label list --repo "$REPO" | grep -E "needs-plan|plan-ready|jules-working|claude-reviewing|claude-approved|needs-revision" || true
