# =============================================================
# jules.yml
# 觸發機： pull_request 被加上 needs-jules label
# 职責：實作 / 大範圍修改；完成後回傳給 Claude 做收尾
# =============================================================
name: Jules Agent

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  jules-dispatch:
    runs-on: ubuntu-latest

    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'needs-jules'

    steps:
      # -------------------------------------------------------
      # 0. 移除 needs-jules label（避免重復觸發）
      # -------------------------------------------------------
      - name: Remove needs-jules label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'needs-jules'
            });

      # -------------------------------------------------------
      # 1. 押出工作區（Jules 需要完整 history 來理解 context）
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      # -------------------------------------------------------
      # 2. 執行 Jules CLI
      #    Jules 目前主要提供 Web UI + GitHub App；
      #    若已有 CLI / API access，將 JULES_API_KEY 放入 secret
      #    並參考 Jules 官方文件置換以下呼叫方式。
      # -------------------------------------------------------
      - name: Run Jules
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== Jules Agent Start ==="
          echo "PR: #${PR_NUMBER}  Branch: ${PR_BRANCH}"

          # 如果有 Jules CLI 可用：
          # jules run \
          #   --repo "${REPO}" \
          #   --branch "${PR_BRANCH}" \
          #   --pr "${PR_NUMBER}" \
          #   --task "Implement the changes requested in PR #${PR_NUMBER} according to Claude's plan in the PR comments."

          # 展示用 placeholder（正式整合後剪掉此行）
          echo "Jules CLI not yet configured. Please set JULES_API_KEY and enable the jules run command above."
          echo "JULES_STATUS=placeholder" >> $GITHUB_ENV

      # -------------------------------------------------------
      # 3. Jules 完成 → 移除 needs-jules，加上 needs-claude
      #    讓 Claude 回來做 review / 總結
      # -------------------------------------------------------
      - name: Hand back to Claude
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            // 加上 needs-claude 讓 Claude workflow 接手
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              labels: ['needs-claude']
            });

            // 也在 PR 留一則 comment，方便人類觀察
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: [
                '**Jules** 已完成實作階段。',
                '',
                '@claude 請回來做 code review、總結本次修改內容，並决定是否需要再迭代。',
                '',
                '> 此訊息由 jules.yml workflow 自動產生'
              ].join('\n')
            });
