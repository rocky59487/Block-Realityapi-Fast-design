name: "03 · Claude 審核 PR"

# ─────────────────────────────────────────────────────────────────────
# 觸發：PR 開啟、更新、重新開啟 — 自動偵測是否為 Jules 的 PR
# 職責：
#   1. 偵測 PR 是否來自 Jules（分支名稱、作者、連結 Issue 標籤）
#   2. 取得 PR diff 與原始 Claude 計畫
#   3. 呼叫 Claude API 進行審核
#   4. 在 PR 發布 GitHub 正式 Review（APPROVE 或 REQUEST_CHANGES）
#   5. 管理標籤：claude-reviewing / claude-approved / needs-revision
#
# 審核迴圈：
#   Jules PR opened → Claude 審核
#   若 REQUEST_CHANGES → Jules 修改 → synchronize → Claude 再次審核
#   直到 APPROVE 為止
# ─────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true    # 若 PR 有新 commit，取消上一次審核，只審最新版

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  detect-jules-pr:
    name: 偵測是否為 Jules PR
    runs-on: ubuntu-latest
    outputs:
      is_jules: ${{ steps.detect.outputs.is_jules }}
      linked_issue: ${{ steps.detect.outputs.linked_issue }}

    steps:
      - name: 偵測 Jules PR
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 - <<'PYEOF'
import os, json, urllib.request, re, sys

token  = os.environ["GITHUB_TOKEN"]
repo   = os.environ["GITHUB_REPOSITORY"]
author = os.environ.get("PR_AUTHOR", "")
branch = os.environ.get("PR_BRANCH", "")
body   = os.environ.get("PR_BODY", "") or ""

# ── 條件 1: 分支名稱以 jules 開頭 ────────────────────────────────
is_jules_branch = branch.lower().startswith("jules")

# ── 條件 2: 作者是 Jules bot ──────────────────────────────────────
is_jules_author = "jules" in author.lower()

# ── 條件 3: 連結的 Issue 有 jules-working 標籤 ────────────────────
linked_issue = None
closes = re.findall(r'(?:closes?|fixes?|resolves?)\s+#(\d+)', body, re.I)

def gh_get(path):
    url = f"https://api.github.com/repos/{repo}/{path}"
    req = urllib.request.Request(url, headers={
        "Authorization": f"Bearer {token}",
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28"
    })
    with urllib.request.urlopen(req) as r:
        return json.loads(r.read())

for issue_num in closes:
    try:
        issue = gh_get(f"issues/{issue_num}")
        labels = [lb["name"] for lb in issue.get("labels", [])]
        if "jules-working" in labels:
            linked_issue = issue_num
            break
    except Exception as e:
        print(f"Warning: could not fetch issue #{issue_num}: {e}", file=sys.stderr)

is_jules = is_jules_branch or is_jules_author or (linked_issue is not None)

# 若無 Closes # 但是 Jules branch，嘗試從分支名稱猜 Issue 號
if is_jules and not linked_issue:
    m = re.search(r'(\d+)', branch)
    if m:
        linked_issue = m.group(1)

with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"is_jules={'true' if is_jules else 'false'}\n")
    f.write(f"linked_issue={linked_issue or ''}\n")

print(f"Jules PR: {is_jules} | branch={branch} | author={author} | linked_issue={linked_issue}")
PYEOF

  review:
    name: Claude 審核 PR
    needs: detect-jules-pr
    if: needs.detect-jules-pr.outputs.is_jules == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout（取得 CLAUDE.md）
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 確保標籤存在並加上 claude-reviewing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # 確保所有審核相關標籤存在
          gh label create "claude-reviewing" --color "d876e3" --description "Claude 正在審核 PR"            --repo "$REPO" --force 2>/dev/null || true
          gh label create "claude-approved"  --color "0e8a16" --description "Claude 已審核通過，可以合併"    --repo "$REPO" --force 2>/dev/null || true
          gh label create "needs-revision"   --color "e11d48" --description "Jules 需要根據 Claude 審核意見修改" --repo "$REPO" --force 2>/dev/null || true
          gh label create "jules-working"    --color "e4e669" --description "Jules 正在實作"                 --repo "$REPO" --force 2>/dev/null || true

          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "claude-reviewing" \
            --repo "$REPO" || true

      - name: 執行 Claude 審核並提交 PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINKED_ISSUE: ${{ needs.detect-jules-pr.outputs.linked_issue }}
        run: python3 .github/scripts/claude_review.py

      - name: 更新 PR 標籤（由 claude_review.py 寫入 REVIEW_DECISION）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DECISION=$(cat /tmp/claude_review_decision 2>/dev/null || echo "REQUEST_CHANGES")
          PR=${{ github.event.pull_request.number }}
          REPO="${{ github.repository }}"

          if [ "$DECISION" = "APPROVE" ]; then
            gh pr edit "$PR" \
              --add-label "claude-approved" \
              --remove-label "claude-reviewing" \
              --remove-label "needs-revision" \
              --repo "$REPO" || true
            echo "✅ PR #$PR 已獲 Claude 批准"
          else
            gh pr edit "$PR" \
              --add-label "needs-revision" \
              --remove-label "claude-reviewing" \
              --repo "$REPO" || true
            echo "🔄 PR #$PR 需要修改"
          fi
