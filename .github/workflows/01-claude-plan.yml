name: "01 · Claude 制定計畫"

# ─────────────────────────────────────────────────────────────────────
# 觸發：Issue 被加上 needs-plan 標籤時
# 職責：
#   1. 讀取 Issue 內容
#   2. 呼叫 Claude API 生成技術計畫
#   3. 將計畫以 [CLAUDE_PLAN] 標記發布為 comment
#   4. 換標籤 needs-plan → plan-ready
# ─────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-plan-${{ github.event.issue.number }}
  cancel-in-progress: false   # 不取消進行中的計畫，防止部分完成

permissions:
  issues: write
  contents: read

jobs:
  plan:
    name: Claude 分析 Issue 並制定計畫
    if: github.event.label.name == 'needs-plan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout（含 CLAUDE.md 作為上下文）
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 呼叫 Claude 制定計畫
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/claude_plan.py

      - name: 更新狀態標籤 needs-plan → plan-ready
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ github.event.issue.number }}
          REPO="${{ github.repository }}"

          # 確保標籤存在（--force = upsert，不存在就建立，已存在就更新）
          gh label create "plan-ready"    --color "cfd3d7" --description "Claude 計畫已完成，等待派遣 Jules" --repo "$REPO" --force 2>/dev/null || true
          gh label create "needs-plan"    --color "0075ca" --description "等待 Claude 制定計畫"              --repo "$REPO" --force 2>/dev/null || true
          gh label create "jules-working" --color "e4e669" --description "Jules 正在實作"                    --repo "$REPO" --force 2>/dev/null || true
          gh label create "claude-reviewing" --color "d876e3" --description "Claude 正在審核 PR"            --repo "$REPO" --force 2>/dev/null || true
          gh label create "claude-approved"  --color "0e8a16" --description "Claude 已審核通過，可以合併"    --repo "$REPO" --force 2>/dev/null || true
          gh label create "needs-revision"   --color "e11d48" --description "Jules 需要根據 Claude 審核意見修改" --repo "$REPO" --force 2>/dev/null || true

          gh issue edit "$ISSUE" \
            --add-label "plan-ready" \
            --remove-label "needs-plan" \
            --repo "$REPO"
          echo "✅ 標籤已更新: needs-plan → plan-ready (Issue #$ISSUE)"
