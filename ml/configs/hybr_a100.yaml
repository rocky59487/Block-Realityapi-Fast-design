# HYBR A100 Meta-Trainer Configuration
# Target: 16^3 grid, adaptive spectral weights, ~4-6 hours on A100 80GB
grid_size: 16
train_samples: 2000
train_steps: 5000
batch_size: 8
peak_lr: 0.001
warmup_steps: 500
weight_decay: 0.0001
hidden: 48
modes: 6
n_global_layers: 3
n_focal_layers: 2
n_backbone_layers: 2
moe_hidden: 32
latent_dim: 32
hypernet_widths: [128, 128]
rank: 2
encoder_type: "spectral"
output_dir: "experiments/outputs/hybr/a100_meta"
cache_dir: "experiments/cache"
use_cache: true
