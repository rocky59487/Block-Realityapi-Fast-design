# reborn-ml A100 Style Trainer Configuration
# Target: 16^3 grid, 4-stage adversarial training, ~3 hours on A100 80GB
grid_size: 16
stage1_steps: 3000
stage2_steps: 3000
stage3_steps: 5000
stage4_steps: 2000
enable_adversarial: true
train_samples: 2000
verbose: true
hidden_channels: 48
fno_modes: 6
n_global_layers: 3
n_focal_layers: 2
n_backbone_layers: 2
moe_hidden: 32
latent_dim: 32
hypernet_widths: [128, 128]
cp_rank: 2
n_styles: 4
style_alpha_init: 0.3
batch_size: 4
peak_lr: 0.001
warmup_steps: 300
weight_decay: 0.0001
grad_clip: 1.0
disc_lr: 0.0004
adv_weight: 0.1
gd_ratio: 5
checkpoint_dir: "experiments/outputs/reborn/a100_style"
cache_dir: "experiments/cache"
use_cache: true
n_fem_workers: 10
prefetch_buffer: 4
eval_interval: 500
n_eval_samples: 50
use_pmap: false
jit_compile: true
